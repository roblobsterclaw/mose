name: Update live market data

on:
  workflow_dispatch:
  schedule:
    # Market-hours refresh, Eastern daylight time mapped to UTC:
    # 9:30 AM-4:00 PM ET, Monday-Friday.
    - cron: "30-59/5 13 * * 1-5"
    - cron: "*/5 14-19 * * 1-5"
    - cron: "0 20 * * 1-5"
    # Off-hours heartbeat: hourly outside market hours plus weekends.
    - cron: "0 0-13,21-23 * * 1-5"
    - cron: "0 * * * 0,6"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh quote snapshot
        env:
          STOOQ_APIKEY: ${{ secrets.STOOQ_APIKEY }}
        run: python scripts/update_live_market_data.py
      - name: Commit quote snapshot
        run: |
          if git diff --quiet live-quotes.json symbol-snapshots.json price-history.json; then
            echo "No quote changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add live-quotes.json symbol-snapshots.json price-history.json
            git commit -m "Update live market data"
            git push origin main
            git push origin HEAD:gh-pages --force
          fi
