name: Update 13F tracker

on:
  workflow_dispatch:
  schedule:
    # Daily during the normal 13F filing windows, plus weekly amendment checks.
    - cron: "15 11 * 2,5,8,11 *"
    - cron: "45 11 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build current 13F tracker export
        run: python scripts/build_13f_tracker.py
      - name: Sync 13F tracker to Supabase
        if: env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: python scripts/sync_13f_tracker_to_supabase.py
      - name: Commit 13F tracker data
        run: |
          if git diff --quiet filing-changes-latest.json; then
            echo "No 13F tracker changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add filing-changes-latest.json
            git commit -m "Update 13F tracker data"
            git push origin main
            git push origin HEAD:gh-pages --force
          fi
